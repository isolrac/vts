<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VST Control</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, Helvetica, sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 2rem;
    }

    .card {
      background: #1c1c1c;
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
    }

    .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #666;
      margin-bottom: 0.4rem;
    }

    .speed-value {
      font-size: 4rem;
      font-weight: 700;
      color: #4ade80;
      line-height: 1;
      margin-bottom: 1.25rem;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #2e2e2e;
      outline: none;
      margin-bottom: 2rem;
      cursor: pointer;
    }

    input[type=range]:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #4ade80;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.4);
    }

    .divider {
      height: 1px;
      background: #2a2a2a;
      margin-bottom: 1.5rem;
    }

    .battery-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .battery-value {
      font-size: 1.4rem;
      font-weight: 600;
      color: #eee;
    }

    .battery-value.low { color: #f87171; }

    button {
      display: block;
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.75rem;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      background: #4ade80;
      color: #111;
      transition: background 0.15s;
    }

    button:hover { background: #22c55e; }
    button.disconnect { background: #3f3f3f; color: #eee; }
    button.disconnect:hover { background: #555; }

    .banner {
      display: none;
      margin-top: 1.5rem;
      border-radius: 10px;
      padding: 0.8rem 1rem;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .banner.warning  { background: #ef4444; color: #fff; }
    .banner.fault    { background: #f97316; color: #fff; }
    .banner.info     { background: #3f3f3f; color: #aaa; }
    .banner.visible  { display: block; }
  </style>
</head>
<body>
  <h1>VST</h1>
  <div class="card">
    <div class="label">Speed</div>
    <div class="speed-value" id="speedVal">0%</div>
    <input type="range" min="0" max="100" value="0" id="slider" disabled>

    <div class="divider"></div>

    <div class="battery-row">
      <div>
        <div class="label">Battery</div>
        <div class="battery-value" id="batVal">--</div>
      </div>
    </div>

    <button id="connectBtn">Connect</button>

    <div class="banner warning" id="warnBattery">Battery critical -- motors stopped</div>
    <div class="banner fault"   id="warnFault">Motor fault detected</div>
    <div class="banner info"    id="infoDisconnected">Disconnected from device</div>
  </div>

  <script>
    // ----- GATT UUIDs (must match code.py) -----
    const SVC_UUID    = 'a8b40001-c4b9-4b5c-9d6e-1f2a3c4d5e6f';
    const SPEED_UUID  = 'a8b40002-c4b9-4b5c-9d6e-1f2a3c4d5e6f';
    const STATUS_UUID = 'a8b40003-c4b9-4b5c-9d6e-1f2a3c4d5e6f';

    // ----- DOM -----
    const slider      = document.getElementById('slider');
    const speedVal    = document.getElementById('speedVal');
    const batVal      = document.getElementById('batVal');
    const connectBtn  = document.getElementById('connectBtn');
    const warnBattery = document.getElementById('warnBattery');
    const warnFault   = document.getElementById('warnFault');
    const infoDisc    = document.getElementById('infoDisconnected');

    // ----- State -----
    let speedChar  = null;
    let gattServer = null;
    let debounce   = null;

    // ----- BLE connection -----
    connectBtn.addEventListener('click', async () => {
      if (gattServer && gattServer.connected) {
        gattServer.disconnect();
        return;
      }

      try {
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [SVC_UUID] }],
          optionalServices: [],
        });

        device.addEventListener('gattserverdisconnected', onDisconnect);

        gattServer = await device.gatt.connect();
        const svc  = await gattServer.getPrimaryService(SVC_UUID);

        speedChar = await svc.getCharacteristic(SPEED_UUID);

        const statusChar = await svc.getCharacteristic(STATUS_UUID);
        await statusChar.startNotifications();
        statusChar.addEventListener('characteristicvaluechanged', onStatus);

        onConnect();
      } catch (err) {
        if (err.name !== 'NotFoundError' && err.name !== 'AbortError') {
          console.error('BLE error:', err);
        }
      }
    });

    function onConnect() {
      connectBtn.textContent = 'Disconnect';
      connectBtn.classList.add('disconnect');
      slider.disabled = false;
      infoDisc.classList.remove('visible');
    }

    function onDisconnect() {
      connectBtn.textContent = 'Connect';
      connectBtn.classList.remove('disconnect');
      slider.disabled = true;
      speedChar  = null;
      gattServer = null;
      infoDisc.classList.add('visible');
      warnBattery.classList.remove('visible');
      warnFault.classList.remove('visible');
    }

    // ----- Status notification -----
    // Packet layout (little-endian): uint16 battery_mv | uint8 speed_pct | uint8 flags
    // flags: bit0 = battery_critical, bit1 = motor_fault
    function onStatus(event) {
      const view    = new DataView(event.target.value.buffer);
      const vMv     = view.getUint16(0, true);
      const pct     = view.getUint8(2);
      const flags   = view.getUint8(3);
      const batCrit = (flags & 0x01) !== 0;
      const fault   = (flags & 0x02) !== 0;

      batVal.textContent = (vMv / 1000).toFixed(2) + ' V';
      batVal.className = 'battery-value' + (batCrit ? ' low' : '');

      warnBattery.classList.toggle('visible', batCrit);
      warnFault.classList.toggle('visible', fault);

      // Sync slider if speed changed on-device (e.g. battery cutoff zeroed it)
      if (Math.abs(parseInt(slider.value) - pct) > 1) {
        slider.value = pct;
        speedVal.textContent = pct + '%';
      }
    }

    // ----- Speed slider -----
    slider.addEventListener('input', () => {
      const value = parseInt(slider.value);
      speedVal.textContent = value + '%';
      clearTimeout(debounce);
      debounce = setTimeout(() => sendSpeed(value), 50);
    });

    async function sendSpeed(value) {
      if (!speedChar) return;
      try {
        await speedChar.writeValueWithoutResponse(new Uint8Array([value]));
      } catch (err) {
        console.error('Write failed:', err);
      }
    }
  </script>
</body>
</html>
